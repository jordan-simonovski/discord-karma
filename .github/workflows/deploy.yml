name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK deploy
        run: |
          npx cdk deploy DiscordKarmaStack \
            --parameters DiscordPublicKey=${{ secrets.DISCORD_PUBLIC_KEY }} \
            --parameters DiscordBotToken=${{ secrets.DISCORD_BOT_TOKEN }} \
            --require-approval never

      - name: Register Discord slash commands
        run: |
          curl --fail --silent --show-error \
            -X PUT "https://discord.com/api/v10/applications/${{ secrets.DISCORD_APPLICATION_ID }}/commands" \
            -H "Authorization: Bot ${{ secrets.DISCORD_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '[
              {
                "name": "karma",
                "description": "Give or remove karma",
                "options": [
                  {
                    "type": 6,
                    "name": "user",
                    "description": "Target user",
                    "required": true
                  },
                  {
                    "type": 3,
                    "name": "action",
                    "description": "Use ++..++++++ or --..------",
                    "required": true
                  }
                ]
              },
              {
                "name": "leaderboard",
                "description": "Show top 5 karma users"
              }
            ]'
